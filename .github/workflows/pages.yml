name: Deploy Web Flasher

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Copy web flasher files
      run: |
        mkdir -p _site
        cp -r web-flasher/* _site/

    - name: Download firmware binaries and generate manifest
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get the most recent release (includes the rolling 'latest' release)
        TAG=$(gh api repos/${{ github.repository }}/releases \
              --jq '.[0].tag_name // empty' 2>/dev/null || echo '')

        if [ -z "$TAG" ]; then
          echo "No release found — keeping placeholder manifest"
          exit 0
        fi

        VERSION="${TAG#v}"
        echo "Downloading binaries from release ${TAG}"

        # Download binaries directly into _site/ so they are served from
        # the same origin as the web flasher (avoids GitHub CDN CORS issues)
        gh release download "$TAG" \
          --pattern "bootloader.bin" \
          --pattern "partition-table.bin" \
          --pattern "track-robot.bin" \
          --dir _site/

        # Manifest uses relative paths — no cross-origin fetch needed
        jq -n \
          --arg name "Tracked Robot Firmware" \
          --arg version "$VERSION" \
          '{
            name: $name,
            version: $version,
            builds: [{
              chipFamily: "ESP32",
              parts: [
                { path: "bootloader.bin",      offset: 4096  },
                { path: "partition-table.bin", offset: 32768 },
                { path: "track-robot.bin",     offset: 65536 }
              ]
            }]
          }' > _site/manifest.json

        echo "manifest.json written:"
        cat _site/manifest.json

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
