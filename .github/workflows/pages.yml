name: Deploy Web Flasher

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Copy web flasher files
      run: |
        mkdir -p _site
        cp -r web-flasher/* _site/

    - name: Generate manifest from latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Query the latest published release via GitHub API
        RELEASE=$(gh api repos/${{ github.repository }}/releases/latest 2>/dev/null || echo '{}')
        TAG=$(echo "$RELEASE" | jq -r '.tag_name // empty')

        if [ -z "$TAG" ]; then
          echo "No release found — keeping placeholder manifest (builds: [])"
          exit 0
        fi

        VERSION="${TAG#v}"
        BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
        echo "Generating manifest for ${TAG}"

        jq -n \
          --arg name "Tracked Robot Firmware" \
          --arg version "$VERSION" \
          --arg boot  "${BASE}/bootloader.bin" \
          --arg pt    "${BASE}/partition-table.bin" \
          --arg app   "${BASE}/track-robot.bin" \
          '{
            name: $name,
            version: $version,
            builds: [{
              chipFamily: "ESP32",
              parts: [
                { path: $boot, offset: 4096  },
                { path: $pt,   offset: 32768 },
                { path: $app,  offset: 65536 }
              ]
            }]
          }' > _site/manifest.json

        echo "manifest.json written:"
        cat _site/manifest.json

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
