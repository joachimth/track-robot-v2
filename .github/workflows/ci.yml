name: Firmware CI

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # contents:write is needed for the rolling latest release on main
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build firmware
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.1.2
        target: esp32
        path: firmware

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-binaries
        path: |
          firmware/build/bootloader/bootloader.bin
          firmware/build/partition_table/partition-table.bin
          firmware/build/track-robot.bin
        retention-days: 30

    # Every merge to main creates/overwrites the 'latest' pre-release so
    # the web flasher always has a real binary to flash.
    - name: Publish rolling latest release (main only)
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Remove previous rolling release + tag so we can recreate them
        gh release delete latest --yes 2>/dev/null || true
        git push origin :refs/tags/latest 2>/dev/null || true

        SHORT_SHA="${GITHUB_SHA::7}"
        DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

        # Write release notes to a temp file to avoid nested-heredoc issues
        cat > /tmp/release-notes.md << 'NOTES'
Automated rolling build from the `main` branch.

This pre-release is overwritten on every merge to `main`.
For stable versioned firmware use a tagged release (e.g. `v1.0.0`).

### Flash via web flasher
https://joachimth.github.io/track-robot-v2/

### Flash manually
```
esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 460800 \
  --before default_reset --after hard_reset write_flash \
  0x1000 bootloader.bin 0x8000 partition-table.bin 0x10000 track-robot.bin
```
NOTES

        gh release create latest \
          --title "Latest Build (${DATE})" \
          --notes-file /tmp/release-notes.md \
          --prerelease \
          firmware/build/bootloader/bootloader.bin \
          firmware/build/partition_table/partition-table.bin \
          firmware/build/track-robot.bin

        echo "Rolling latest release updated (commit ${SHORT_SHA})"
