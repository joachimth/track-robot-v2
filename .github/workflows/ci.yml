name: Firmware CI

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # contents:write is needed for the rolling latest release on main
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build firmware
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.1.2
        target: esp32
        path: firmware

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-binaries
        path: |
          firmware/build/bootloader/bootloader.bin
          firmware/build/partition_table/partition-table.bin
          firmware/build/track-robot.bin
        retention-days: 30

    # Every merge to main creates/overwrites the 'latest' pre-release so
    # the web flasher always has a real binary to flash.
    - name: Publish rolling latest release (main only)
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Remove previous rolling release + tag so we can recreate them
        gh release delete latest --yes 2>/dev/null || true
        git push origin :refs/tags/latest 2>/dev/null || true

        SHORT_SHA="${GITHUB_SHA::7}"
        DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

        gh release create latest \
          --title "Latest Build (${DATE})" \
          --notes-file .github/latest-release-notes.md \
          --latest \
          firmware/build/bootloader/bootloader.bin \
          firmware/build/partition_table/partition-table.bin \
          firmware/build/track-robot.bin

        echo "Rolling latest release updated (commit ${SHORT_SHA})"
